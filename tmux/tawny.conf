# tawny dark theme for tmux
# https://github.com/your-name/tawny.nvim

# status bar base
set -g status-style                  "bg=#241d19,fg=#b39a82"
set -g status-left-length            50
set -g status-right-length           80

# powerline separators (requires Nerd Font / Powerline font)
# solid:
# thin:

# status-left: [session name]
set -g status-left \
  "#[bg=#b39a82,fg=#2b241f,bold] #S #[bg=#241d19,fg=#b39a82,nobold] "

# status-right: [host] [date time]
set -g status-right \
  "#[bg=#5d4d42,fg=#241d19]#[bg=#5d4d42,fg=#b39a82] #h #[bg=#b39a82,fg=#5d4d42]#[bg=#b39a82,fg=#2b241f] %Y-%m-%d  %H:%M "

# window list
set -g window-status-format \
  "#[bg=#241d19,fg=#b39a82] #{b:pane_current_path}  #I #W#F "

set -g window-status-current-format \
  "#[bg=#b39a82,fg=#241d19]#[bg=#b39a82,fg=#2b241f,bold] #{b:pane_current_path} #[bg=#35302a,fg=#b39a82]#[bg=#35302a,fg=#ead6b4,bold] #I #W#F #[bg=#241d19,fg=#35302a]"

set -g window-status-activity-style  "bg=#241d19,fg=#dfb978"
set -g window-status-bell-style      "bg=#241d19,fg=#c86a68"

# pane borders
set -g pane-border-style             "fg=#5d4d42"
set -g pane-active-border-style      "fg=#b39a82"

# message / command prompt
set -g message-style                 "bg=#35302a,fg=#ead6b4"
set -g message-command-style         "bg=#35302a,fg=#b39a82"

# copy mode
set -g mode-style                    "bg=#35302a,fg=#ead6b4"
