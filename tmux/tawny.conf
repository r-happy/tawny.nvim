# tawny dark theme for tmux
# https://github.com/your-name/tawny.nvim

# status bar base
set -g status-style                  "bg=#211a17,fg=#aa947d"
set -g status-left-length            50
set -g status-right-length           80

# powerline separators (requires Nerd Font / Powerline font)
# solid:
# thin:

# status-left: [session name]
set -g status-left \
  "#[bg=#aa947d,fg=#28211d,bold] #S #[bg=#211a17,fg=#aa947d,nobold] "

# status-right: [host] [date time]
set -g status-right \
  "#[bg=#584a40,fg=#211a17]#[bg=#584a40,fg=#aa947d] #h #[bg=#aa947d,fg=#584a40]#[bg=#aa947d,fg=#28211d] %Y-%m-%d  %H:%M "

# window list
set -g window-status-format \
  "#[bg=#211a17,fg=#aa947d] #{b:pane_current_path}  #I #W#F "

set -g window-status-current-format \
  "#[bg=#aa947d,fg=#211a17]#[bg=#aa947d,fg=#28211d,bold] #{b:pane_current_path} #[bg=#312c27,fg=#aa947d]#[bg=#312c27,fg=#e2d1b3,bold] #I #W#F #[bg=#211a17,fg=#312c27]"

set -g window-status-activity-style  "bg=#211a17,fg=#cdb07a"
set -g window-status-bell-style      "bg=#211a17,fg=#b67a70"

# pane borders
set -g pane-border-style             "fg=#584a40"
set -g pane-active-border-style      "fg=#aa947d"

# message / command prompt
set -g message-style                 "bg=#312c27,fg=#e2d1b3"
set -g message-command-style         "bg=#312c27,fg=#aa947d"

# copy mode
set -g mode-style                    "bg=#312c27,fg=#e2d1b3"
