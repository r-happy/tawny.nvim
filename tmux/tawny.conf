# tawny dark theme for tmux
# https://github.com/your-name/tawny.nvim

# status bar base
set -g status-style                  "bg=#14100d,fg=#9a7f68"
set -g status-left-length            50
set -g status-right-length           80

# powerline separators (requires Nerd Font / Powerline font)
# solid:
# thin:

# status-left: [session name]
set -g status-left \
  "#[bg=#3a2c26,fg=#f0d3ae,bold] #S #[bg=#14100d,fg=#9a7f68,nobold] "

# status-right: [host] [date time]
set -g status-right \
  "#[bg=#3a2c26,fg=#14100d]#[bg=#3a2c26,fg=#9a7f68] #h #[bg=#9a7f68,fg=#3a2c26]#[bg=#9a7f68,fg=#171310] %Y-%m-%d  %H:%M "

# window list
set -g window-status-format \
  "#[bg=#14100d,fg=#9a7f68] #{b:pane_current_path}  #I #W#F "

set -g window-status-current-format \
  "#[bg=#9a7f68,fg=#14100d]#[bg=#9a7f68,fg=#171310,bold] #{b:pane_current_path} #[bg=#221e1b,fg=#9a7f68]#[bg=#221e1b,fg=#f0d3ae,bold] #I #W#F #[bg=#14100d,fg=#221e1b]"

set -g window-status-activity-style  "bg=#14100d,fg=#f1bc63"
set -g window-status-bell-style      "bg=#14100d,fg=#d45f70"

# pane borders
set -g pane-border-style             "fg=#3a2c26"
set -g pane-active-border-style      "fg=#9a7f68"

# message / command prompt
set -g message-style                 "bg=#221e1b,fg=#f0d3ae"
set -g message-command-style         "bg=#221e1b,fg=#9a7f68"

# copy mode
set -g mode-style                    "bg=#221e1b,fg=#f0d3ae"
